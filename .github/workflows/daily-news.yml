name: Daily AI News

on:
  schedule:
    - cron: "0 23 * * *" # UTC 23:00 = CST 07:00
  workflow_dispatch:

jobs:
  fetch-huxiu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Huxiu AI News
        run: python3 .opencode/skills/huxiu-ai-news/scripts/fetch_huxiu_ai_news.py --limit 10 --git-push
        env:
          AI_NEWS_DAILY_DATA_DIR: ./data

  fetch-x-topics:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Fetch X Hot Topics
        run: echo "X topics fetching requires browser automation (Playwright) - not yet available in CI. See .opencode/skills/x-hot-topics-daily/SKILL.md for manual fetch instructions."
        # TODO: Implement X topics fetching via Playwright headless or X API v2
        # Current blocker: X topics skill uses browser automation which needs
        # authenticated browser session. Options:
        # 1. Use X API v2 with API key (requires developer account)
        # 2. Set up Playwright with stored cookies in CI secrets

  build-verify:
    needs: [fetch-huxiu, fetch-x-topics]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test